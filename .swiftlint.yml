# SwiftLint Configuration for GymBro
# See https://realm.github.io/SwiftLint/rule-directory.html

# Paths to include/exclude
included:
  - GymBro
  - GymBroTests
  - GymBroUITests
excluded:
  - Pods
  - .build
  - DerivedData
  - .copilot
  - .squad

# Rules Configuration
opt_in_rules:
  - anyobject_protocol
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - todo # Allow TODOs during development
  - line_length # Handled by prettier/formatter

# Rule Customization
type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z

# Custom Rules
custom_rules:
  no_print:
    name: "No Print Statements"
    regex: '\bprint\('
    message: "Use logger instead of print() for production code"
    severity: warning
  
  no_force_cast:
    name: "No Force Casts in Production"
    regex: '\s+as!\s+'
    match_kinds:
      - typeidentifier
    message: "Avoid force casting with 'as!' - use safe casting or guard"
    severity: warning

# Reporter Type
reporter: "xcode" # or "json", "csv", "checkstyle", "junit", "html", "emoji"
