appId: com.gymbro.app
name: "Negative - Empty State UI (fresh app with no data)"
#
# Tests: Empty state UI across all tabs with fresh app install
# Preconditions: App launched with clearState (fresh install simulation)
# Test data: User name "EmptyTest", units kg (name stored in preferences, not shown on Profile)
# Assertions: All tabs (Home, Programs, History, Profile) handle empty state gracefully
# Cleanup: App state cleared via stopApp
# Dependencies: None
tags:
  - negative
  - core
onFlowStart:
  # Start completely fresh with clearState
  - stopApp

onFlowComplete:
  - stopApp

---

# Launch with clearState to wipe all data
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 3000

# Complete onboarding quickly to get past it
- assertVisible: "GymBro"
# Screenshot 01: Onboarding start screen (fresh app state)
- takeScreenshot: 01_empty_state_onboarding_start

# Swipe through onboarding pages
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400
- swipe:
    direction: LEFT
    duration: 400

# Complete onboarding setup (name first, then dismiss keyboard)
- tapOn:
    id: "onboarding_name_input"
- inputText: "EmptyTest"
- tapOn:
    point: "50%,20%"
- waitForAnimationToEnd:
    timeout: 2000
# Tap start button using coordinates (testTag targets wrapper View, not clickable button)
# Button is at left side of screen, center ~(20%, 69%)
- tapOn:
    point: "20%,69%"
- waitForAnimationToEnd:
    timeout: 3000

# Now at Home/Programs (post-onboarding) — navigate to Home tab
- tapOn:
    id: "nav_home"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Inicio|Home"
# Screenshot 02: Home screen empty state (no workouts yet)
- takeScreenshot: 02_empty_state_home

# TEST 1: Check Programs tab
- tapOn:
    id: "nav_programs"
- waitForAnimationToEnd:
    timeout: 2000

# Verify Programs screen loaded
- assertVisible: "Programas|Programs"
# Screenshot 03: Programs tab state
- takeScreenshot: 03_empty_state_programs

# TEST 2: Check History tab (should show empty state)
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 2000

# Verify History screen loaded
- assertVisible: "Historial|History"
# Screenshot 04: History tab empty state (no workout history)
- takeScreenshot: 04_empty_state_history
# Should show empty state message or empty list

# TEST 3: Check Profile tab
- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 2000

# Verify Profile screen loaded
- assertVisible: "Perfil|Profile"
# Screenshot 05: Profile tab with fresh user data
- takeScreenshot: 05_empty_state_profile

# Verify app handles empty/not-signed-in state gracefully on Profile
# Profile shows Firebase Auth display name, NOT the onboarding name.
# After clearState, user is not signed in — profile header shows fallback text.
- assertVisible: "No has iniciado sesión|Not signed in|Levantador Anónimo|Anonymous Lifter"
