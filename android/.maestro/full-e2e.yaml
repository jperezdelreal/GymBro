appId: com.gymbro.app
name: "Full E2E — Complete user journey: onboarding → workout → history"
tags:
  - e2e
  - regression
---

onFlowComplete:
  # Clear app state after full E2E
  - stopApp

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 3000

# === PHASE 1: ONBOARDING ===

# Welcome page
- assertVisible: "GymBro"
- takeScreenshot: e2e_onboarding_start

# Swipe through all pages
- swipe:
    direction: LEFT
    duration: 400
- assertVisible: "Registro Ultra-Rápido"

- swipe:
    direction: LEFT
    duration: 400
- assertVisible: "Rastrea tu Progreso"

- swipe:
    direction: LEFT
    duration: 400
- assertVisible: "Comencemos"

# Select units and enter name
- tapOn: "Kilogramos (kg)"
- tapOn:
    id: "onboarding_name_input"
- inputText: "${USER_NAME:=E2EUser}"
- hideKeyboard

# Complete onboarding
- tapOn:
    id: "onboarding_start"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Biblioteca de Ejercicios"
- takeScreenshot: e2e_onboarding_complete

# === PHASE 2: QUICK LIBRARY BROWSE ===

# Dismiss tooltip if present
- tapOn:
    text: "Got it"
    optional: true

# Verify library content is loaded
- takeScreenshot: e2e_library_loaded

# === PHASE 3: START AND COMPLETE WORKOUT ===

# Tap FAB to start workout
- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Entrenamiento Activo"
- takeScreenshot: e2e_workout_started

# Add an exercise
- tapOn: "Añadir Ejercicio"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Elegir Ejercicio"

# Pick an exercise
- tapOn:
    text: "${EXERCISE_NAME:=Bench Press}"
    index: 0
- waitForAnimationToEnd:
    timeout: 2000

# Fill in set data
- assertVisible: "Entrenamiento Activo"
- tapOn:
    id: "weight_input"
    index: 0
- inputText: "${WEIGHT:=80}"

- tapOn:
    id: "reps_input"
    index: 0
- inputText: "${REPS:=10}"

- takeScreenshot: e2e_set_filled

# Complete the set
- tapOn:
    text: "Completar serie 1"
- waitForAnimationToEnd:
    timeout: 1000

# Finish workout
- tapOn: "Finalizar Entrenamiento"
- waitForAnimationToEnd:
    timeout: 2000

# Verify summary
- assertVisible: "¡Entrenamiento Completado!"
- takeScreenshot: e2e_workout_summary

# Tap done
- tapOn: "Listo"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Biblioteca de Ejercicios"

# === PHASE 4: VERIFY HISTORY ===

# Navigate to History tab
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Historial de Entrenamientos"
- takeScreenshot: e2e_history_with_workout

# Verify the workout appears (today's entry)
- assertVisible:
    text: "Hoy"
    optional: true

# === PHASE 5: CHECK PROGRESS ===

# Navigate to Progress tab
- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: e2e_progress_after_workout

# === PHASE 6: VERIFY PROFILE ===

# Navigate to Profile tab
- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Cuenta"
- takeScreenshot: e2e_profile

# Return to library
- tapOn:
    id: "nav_exercise_library"
- assertVisible: "Biblioteca de Ejercicios"
- takeScreenshot: e2e_complete
