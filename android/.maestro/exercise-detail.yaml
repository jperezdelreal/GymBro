appId: com.gymbro.app
name: "Exercise Detail - Navigate to exercise detail and verify real content"
#
# Tests: Exercise detail screen shows real content, not a placeholder
# Preconditions: User has completed onboarding (ensured by ensure-post-onboarding.yaml)
# Test data: None
# Assertions: Exercise detail screen displays exercise name, description, and muscle group — NOT "Exercise Detail" placeholder
# Cleanup: Navigate back
# Dependencies: flow/ensure-post-onboarding.yaml
#
# BUG CONTEXT: exercise_detail/{exerciseId} currently renders PlaceholderScreen("Exercise Detail")
# instead of real exercise data. This test documents the expected behavior.
tags:
  - library
  - regression
onFlowStart:
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000

onFlowComplete:
  # Cancel any active workout and return to Home
  - back:
      optional: true
  - tapOn:
      text: "Cancelar Entrenamiento|Cancel Workout|Descartar"
      optional: true
  - tapOn:
      id: "nav_home"
      optional: true

---

- runFlow: flow/ensure-post-onboarding.yaml

# Navigate to Home tab
- tapOn:
    id: "nav_home"
- waitForAnimationToEnd:
    timeout: 2000

# Start a workout to access exercise library via picker
- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000

# Open exercise picker
- tapOn: "Añadir Ejercicio|Add Exercise"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Elegir Ejercicio|Choose Exercise"
# Screenshot 01: Exercise picker opened
- takeScreenshot: 01_exercise_detail_picker_opened

# Search for a known exercise
- tapOn:
    id: "search_bar"
- inputText: "Bench"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
# Screenshot 02: Search results for Bench
- takeScreenshot: 02_exercise_detail_search_results

# Tap on the exercise to navigate to detail
# Note: In picker mode this may select the exercise instead of navigating to detail.
# If the library has a separate detail navigation, use that path instead.
- tapOn:
    text: ".*Bench.*Press.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 3000
# Screenshot 03: After tapping exercise
- takeScreenshot: 03_exercise_detail_after_tap

# BUG ASSERTION: The exercise detail should show real content.
# Currently exercise_detail/{id} renders PlaceholderScreen("Exercise Detail") —
# a static text with no actual exercise data. After the fix, we should see
# the exercise name, description, and muscle group info.
#
# This assertion checks that we do NOT see only the bare placeholder text.
# If we're still on the picker (exercise was selected, not navigated to detail),
# that's also acceptable — the bug is specifically in the standalone detail route.
- assertVisible:
    text: ".*Bench.*Press.*|Entrenamiento Activo|Active Workout"
# Screenshot 04: Verifying real content (not placeholder)
- takeScreenshot: 04_exercise_detail_content_check

# Navigate back
- back
- waitForAnimationToEnd:
    timeout: 2000
# Screenshot 05: Navigated back after detail check
- takeScreenshot: 05_exercise_detail_navigated_back
