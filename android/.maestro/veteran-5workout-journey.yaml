    timeout: 500
- tapOn: "Kilogramos \\(kg\\)|Kilograms \\(kg\\)"
- waitForAnimationToEnd:
    timeout: 300
- tapOn:
    id: "onboarding_name_input"
- inputText: "Carlos"
# Dismiss keyboard + floating toolbar by tapping empty area
- tapOn:
    point: "50%,30%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: v07_profile_ready

# Complete onboarding — tap "Let's Go" button directly
- tapOn:
