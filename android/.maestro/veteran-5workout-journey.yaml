- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500

# Page 9: Get Started — kg + name "Carlos"
