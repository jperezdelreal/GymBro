# ====================================================================================
# VETERAN 5-WORKOUT JOURNEY — Carlos's critical evaluation of GymBro
# ====================================================================================
# Simulates an EXPERIENCED LIFTER (4 years PPL) testing GymBro:
#   - Persona: "Carlos", Advanced, Strength, KG, 5 days/week, 90 min, Bulk
#   - Heavy barbell weights: Bench 100kg, Squat 130kg, Deadlift 160kg
#   - Tests progression tracking (Bench 100→102.5kg)
#   - Explores: exercise library search/filter, programs, history detail, profile
#   - Validates: logging speed, data persistence, smart defaults, progress charts
#
# PATTERNS (from established flows):
#   - Text tap for onboarding button (Let's Go|Vamos|Comenzar)
#   - pressKey "Enter" for NumberInputDialog
#   - "Seguir entrenando|Continue Training" + "Saltar Descanso|Saltar|Skip" for rest
#   - "Añadir Serie|Add Set" to pre-add 3rd set
#   - No hideKeyboard (backgrounds app) — use exercise_card ID selectors
#   - Bilingual regex "Spanish|English" for all assertions
#   - One exercise per workout to avoid scroll/index issues
#   - swipe DOWN to scroll content UP (return to top before Finish)
# ====================================================================================

# ====================================================================================
# PHASE 1: ONBOARDING (9 pages — veteran persona)
# ====================================================================================

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: v01_welcome

# Page 0: Welcome — Carlos's first impression
- assertVisible: "GymBro"

# Page 1: Next → Goal
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500

# Select Strength (powerlifter at heart)
- tapOn: "Fuerza|Strength"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: v02_goal_strength

# Page 2: Next → Experience
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Avanzado|Advanced"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: v03_experience_advanced

# Page 3: Next → Training Phase
