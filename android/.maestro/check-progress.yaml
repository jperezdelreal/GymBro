appId: com.gymbro.app
name: "Check Progress — Navigate to progress and verify KPI cards"
tags:
  - progress
  - smoke
---

- runFlow: flow/ensure-post-onboarding.yaml

onFlowStart:
  # Ensure post-onboarding state
  - launchApp
  - assertVisible: "Biblioteca de Ejercicios"

onFlowComplete:
  # Return to Library tab
  - tapOn:
      id: "nav_exercise_library"
      optional: true

# Navigate to Progress tab
- tapOn:
    id: "nav_progress"
- takeScreenshot: progress_tab

# Check for content or empty state
- assertVisible:
    text: "Sin entrenamientos aún"
    optional: true

# If data exists, verify KPI section
- assertVisible:
    text: "Volumen Semanal"
    optional: true
- assertVisible:
    text: "PRs Recientes"
    optional: true
- assertVisible:
    text: "Estimated 1RM Trend"
    optional: true
- takeScreenshot: progress_kpi_cards

# Scroll down to see more content
- scroll
- takeScreenshot: progress_scrolled
