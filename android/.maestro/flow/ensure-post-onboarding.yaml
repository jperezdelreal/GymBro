appId: com.gymbro.app
name: "Ensure Post-Onboarding State"
---

# This sub-flow verifies the app is past onboarding
# If onboarding is visible, complete it to reach post-onboarding state

- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Check if we're on onboarding or post-onboarding
- runFlow:
    when:
      visible: "GymBro"
      notVisible: "Programas|Programs"
    commands:
      # We're on onboarding — complete it
      - swipe:
          direction: LEFT
          duration: 400
      - swipe:
          direction: LEFT
          duration: 400
      - swipe:
          direction: LEFT
          duration: 400
      - tapOn: "Kilogramos \\(kg\\)|Kilograms \\(kg\\)"
      - tapOn:
          id: "onboarding_name_input"
      - inputText: "TestUser"
      # Tap empty area to dismiss Gboard floating toolbar
      - tapOn:
          point: "50%,10%"
      - waitForAnimationToEnd:
          timeout: 2000
      # Tap the start button using coordinates (testTag targets wrapper View, not clickable button)
      # Button is at left side of screen, center ~(20%, 69%)
      - tapOn:
          point: "20%,69%"
      - waitForAnimationToEnd:
          timeout: 5000

# Verify we're now post-onboarding (lands on Programs after plan generation)
- assertVisible: "Programas|Programs"
