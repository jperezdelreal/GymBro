appId: com.gymbro.app
name: "Start Workout - Begin workout, add exercises, log sets"
#
# Tests: Starting a workout, adding exercises via search, and logging set data
# Preconditions: User has completed onboarding (ensured by ensure-post-onboarding.yaml)
# Test data: EXERCISE_SEARCH (Bench), EXERCISE_NAME (Bench Press), WEIGHT (80), REPS (8)
# Assertions: Workout starts, exercise picker opens, exercise added, set data entered
# Cleanup: Cancel active workout
# Dependencies: flow/ensure-post-onboarding.yaml
tags:
  - core
onFlowStart:
  # Launch app — ensure-post-onboarding.yaml handles onboarding state
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000

onFlowComplete:
  # Cancel any active workout to clean up
  - back:
      optional: true
  - tapOn:
      text: "Cancelar Entrenamiento|Descartar"
      optional: true

---

- runFlow: flow/ensure-post-onboarding.yaml

# Navigate to Home tab
- tapOn:
    id: "nav_home"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Inicio|Home"

# Tap FAB to start new workout
- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000

# Verify Active Workout screen
- assertVisible: "Entrenamiento Activo"
# Screenshot 01: Active workout screen after starting
- takeScreenshot: 01_start_workout_started

# Tap Add Exercise button
- tapOn: "Añadir Ejercicio"
- waitForAnimationToEnd:
    timeout: 2000

# Verify exercise picker opens
- assertVisible: "Elegir Ejercicio"
# Screenshot 02: Exercise picker opened from workout
- takeScreenshot: 02_start_workout_exercise_picker

# Search and select an exercise
- tapOn:
    id: "search_bar"
- inputText: "Squat"
# Dismiss keyboard so autocomplete doesn't capture tap
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
# Screenshot 03: Search query entered in exercise picker
- takeScreenshot: 03_start_workout_exercise_picker_search

# Tap the first exercise card result (clickable via Card onClick, not modifier)
- tapOn:
    text: ".*Squat.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 3000

# Back on workout screen — verify exercise was added
- assertVisible: "Entrenamiento Activo"
# Screenshot 04: Exercise added to active workout
- takeScreenshot: 04_start_workout_exercise_added

# Log a set — enter weight value
- tapOn:
    id: "weight_input"
    index: 0
- inputText: "${WEIGHT || '80'}"

# Enter reps
- tapOn:
    id: "reps_input"
    index: 0
- inputText: "${REPS || '8'}"

# Screenshot 05: Set data logged (weight and reps entered)
- takeScreenshot: 05_start_workout_set_logged

# ─── BUG REGRESSION: Verify exercise appears in workout list after picking ───
# The exercise name from the picker should be visible in the workout
- assertVisible:
    text: ".*Squat.*"
# Screenshot 06: Exercise name confirmed visible in workout list
- takeScreenshot: 06_start_workout_exercise_name_confirmed

# Add a second exercise to verify the list grows
- tapOn: "Añadir Ejercicio|Add Exercise"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Elegir Ejercicio|Choose Exercise"
- tapOn:
    id: "search_bar"
- inputText: "Bench"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: ".*Bench.*Press.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 3000

# Verify both exercises are now visible in the workout
- assertVisible:
    text: ".*Squat.*"
- assertVisible:
    text: ".*Bench.*Press.*"
# Screenshot 07: Two exercises confirmed in workout list
- takeScreenshot: 07_start_workout_two_exercises_added
