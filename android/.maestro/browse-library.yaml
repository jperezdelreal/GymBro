appId: com.gymbro.app
name: "Browse Library — Search and filter exercises"
tags:
  - library
  - smoke
---

- runFlow: flow/ensure-post-onboarding.yaml

onFlowStart:
  # Start at library with clean filters
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000
  - assertVisible: "Biblioteca de Ejercicios"

onFlowComplete:
  # Clear any active search/filter state
  - launchApp
  - assertVisible: "Biblioteca de Ejercicios"

# Verify Exercise Library is visible
- assertVisible: "Biblioteca de Ejercicios"
- takeScreenshot: library_home

# Tap on search bar and type a query
- tapOn:
    id: "search_bar"
- waitForAnimationToEnd:
    timeout: 1000
- inputText: "Press"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: library_search_results

# Conditional: Check search results
- runFlow:
    when:
      visible:
        id: "exercise_card"
    commands:
      # Results found — use scrollUntilVisible to find specific exercise
      - scrollUntilVisible:
          element:
            text: ".*Press.*"
          timeout: 5000
      - takeScreenshot: library_exercise_found
      
      # Tap the found exercise
      - tapOn:
          text: ".*Press.*"
          index: 0
      - waitForAnimationToEnd:
          timeout: 1000
      - takeScreenshot: library_exercise_detail
      
      # Navigate back
      - back

- runFlow:
    when:
      visible: "No se encontraron ejercicios"
    commands:
      # No results path
      - assertVisible: "No se encontraron ejercicios"
      - takeScreenshot: library_no_search_results

# Relaunch app to clear search
- launchApp
- waitForAnimationToEnd:
    timeout: 3000

# Wait for library to load
- assertVisible: "Biblioteca de Ejercicios"

# Filter by Chest muscle group
- tapOn: "Pecho"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: library_filter_chest

# Deselect Chest, select Back
- tapOn: "Pecho"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Espalda"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: library_filter_back

# Deselect Back, select Shoulders
- tapOn: "Espalda"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Hombros"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: library_filter_shoulders

# Deselect filter
- tapOn: "Hombros"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: library_no_filter
