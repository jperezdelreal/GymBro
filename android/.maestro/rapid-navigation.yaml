appId: com.gymbro.app
name: "Negative — Rapid Navigation Stress Test"
tags:
  - negative
  - regression
---

- runFlow: flow/ensure-post-onboarding.yaml

onFlowStart:
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000
  - assertVisible: "Biblioteca de Ejercicios"

# Start from Exercise Library
- assertVisible: "Biblioteca de Ejercicios"
- takeScreenshot: rapid_nav_start

# RAPID TAP SEQUENCE 1: Cycle through all nav tabs quickly
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Historial|History"

- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Progreso|Progress"

- tapOn:
    id: "nav_recovery"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Perfil|Profile"

- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Biblioteca de Ejercicios"

- takeScreenshot: rapid_nav_cycle1

# RAPID TAP SEQUENCE 2: Reverse order
- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_recovery"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500

- takeScreenshot: rapid_nav_cycle2

# RAPID TAP SEQUENCE 3: Random pattern
- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_recovery"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500

- takeScreenshot: rapid_nav_cycle3

# STRESS TEST: Multiple rapid taps on same tab
- tapOn:
    id: "nav_history"
- tapOn:
    id: "nav_history"
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Historial|History"

- tapOn:
    id: "nav_exercise_library"
- tapOn:
    id: "nav_exercise_library"
- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Biblioteca de Ejercicios"

- takeScreenshot: rapid_nav_stress

# Final verification: All tabs still work correctly
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Historial|History"

- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Progreso|Progress"

- tapOn:
    id: "nav_recovery"
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Perfil|Profile"

- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "Biblioteca de Ejercicios"

- takeScreenshot: rapid_nav_complete
