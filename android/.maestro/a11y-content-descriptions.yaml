appId: com.gymbro.app
name: "Accessibility - Content Descriptions"
tags:
  - accessibility

# Tests: Verify interactive elements have proper identifiers for screen readers
# Preconditions: Post-onboarding state, all key screens loaded
# Test data: None required
# Assertions: testTag IDs exist and are visible on all main screens
# Cleanup: Return to Home tab
# Dependencies: ensure-post-onboarding flow

onFlowStart:
  # Start with clean state
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000

onFlowComplete:
  # Return to Home tab
  - tapOn:
      id: "nav_home"
      optional: true
  - waitForAnimationToEnd:
      timeout: 1000

---

- runFlow: flow/ensure-post-onboarding.yaml

# Home Screen — Verify key element identifiers
- tapOn:
    id: "nav_home"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Inicio|Home"
- assertVisible:
    id: "quick_start_card"
    optional: true
- assertVisible:
    id: "workout_fab"
- takeScreenshot: a11y_content_home

# Programs Screen — Verify navigation identifier
- tapOn:
    id: "nav_programs"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Programas|Programs"
- assertVisible:
    id: "nav_programs"
- takeScreenshot: a11y_content_programs

# History Screen — Verify navigation identifier
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Historial|History"
- assertVisible:
    id: "nav_history"
- takeScreenshot: a11y_content_history

# Profile Screen — Verify navigation identifier
- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Perfil|Profile"
- assertVisible:
    id: "nav_profile"
- takeScreenshot: a11y_content_profile

# Verify AI Coach button is identifiable
- assertVisible: "Hablar con Entrenador IA"

# Start a workout to verify workout-related identifiers
- tapOn:
    id: "nav_home"
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000

# Check for workout input identifiers (if workout started successfully)
- assertVisible:
    text: "weight_input|reps_input|Guardar Serie"
    optional: true
- takeScreenshot: a11y_content_workout_inputs

# Return to Home
- back
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: a11y_content_complete
