appId: com.gymbro.app
name: "Accessibility — Content Descriptions"
tags:
  - accessibility

# Tests: Verify interactive elements have proper identifiers for screen readers
# Preconditions: Post-onboarding state, all key screens loaded
# Test data: None required
# Assertions: testTag IDs exist and are visible on all main screens
# Cleanup: Return to Library tab
# Dependencies: ensure-post-onboarding flow

onFlowStart:
  # Start at library with clean state
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000
  - assertVisible: "Biblioteca de Ejercicios"

onFlowComplete:
  # Return to Library tab
  - tapOn:
      id: "nav_exercise_library"
      optional: true
  - waitForAnimationToEnd:
      timeout: 1000

---

- runFlow: flow/ensure-post-onboarding.yaml

# Library Screen — Verify key element identifiers
- assertVisible: "Biblioteca de Ejercicios"
- assertVisible:
    id: "search_bar"
- assertVisible:
    id: "workout_fab"
- takeScreenshot: a11y_content_library

# Check exercise cards are identifiable
- assertVisible:
    id: "exercise_card"
    optional: true
- takeScreenshot: a11y_content_exercise_cards

# History Screen — Verify navigation identifier
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Historial"
- assertVisible:
    id: "nav_history"
- takeScreenshot: a11y_content_history

# Progress Screen — Verify navigation identifier
- tapOn:
    id: "nav_progress"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Progreso"
- assertVisible:
    id: "nav_progress"
- takeScreenshot: a11y_content_progress

# Recovery Screen — Verify navigation identifier
- tapOn:
    id: "nav_recovery"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Recuperación"
- assertVisible:
    id: "nav_recovery"
- takeScreenshot: a11y_content_recovery

# Profile Screen — Verify navigation identifier
- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Perfil"
- assertVisible:
    id: "nav_profile"
- takeScreenshot: a11y_content_profile

# Verify AI Coach button is identifiable
- assertVisible: "Hablar con el Entrenador IA"

# Start a workout to verify workout-related identifiers
- tapOn:
    id: "nav_exercise_library"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Biblioteca de Ejercicios"

- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000

# Check for workout input identifiers (if workout started successfully)
- assertVisible:
    text: "weight_input|reps_input|Guardar Serie"
    optional: true
- takeScreenshot: a11y_content_workout_inputs

# Return to library
- back
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: a11y_content_complete
