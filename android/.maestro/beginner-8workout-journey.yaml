# ====================================================================================
# WORKOUT 1: Nervous first day — Dumbbell Bench Press 2 sets (5kg × 12, 5kg × 10)
# ====================================================================================

- launchApp
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "workout_fab"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Entrenamiento Activo|Active Workout"
- takeScreenshot: b12_workout1_start

- tapOn: "Añadir Ejercicio|Add Exercise"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Esperar|Wait"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Elegir Ejercicio|Choose Exercise|Pick Exercise"

- tapOn:
    id: "search_bar"
- inputText: "dumbbell bench"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: "exercise_card_.*"
    index: 0
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    text: "Entendido|Got it"
    optional: true
- waitForAnimationToEnd:
    timeout: 500

# Set 1: 5kg × 12
- tapOn:
    id: "weight_input"
    index: 0
- waitForAnimationToEnd:
    timeout: 500
- inputText: "5"
- pressKey: "Enter"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: "reps_input"
    index: 0
- waitForAnimationToEnd:
    timeout: 500
- inputText: "12"
- pressKey: "Enter"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Completar serie.*|Complete set.*"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: b13_w1_set1

- tapOn:
    text: "Skip|Saltar"
    optional: true
- waitForAnimationToEnd:
    timeout: 500

# Set 2: 5kg × 10
- tapOn:
    id: "weight_input"
    index: 1
- waitForAnimationToEnd:
    timeout: 500
- inputText: "5"
- pressKey: "Enter"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: "reps_input"
    index: 1
- waitForAnimationToEnd:
    timeout: 500
- inputText: "10"
- pressKey: "Enter"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Completar serie.*|Complete set.*"
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: b14_w1_set2

# Scroll to top, skip rest, finish
- tapOn:
    text: "Skip|Saltar"
    optional: true
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Finalizar Entrenamiento|Finish Workout"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Entrenamiento Completado|Workout Complete!"
- takeScreenshot: b15_w1_summary
- tapOn: "Listo|Done"
- waitForAnimationToEnd:
    timeout: 2000

