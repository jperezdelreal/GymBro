# ====================================================================================
# BEGINNER 8-WORKOUT JOURNEY — Alex's first 8 gym sessions
# ====================================================================================
# Simulates a COMPLETE BEGINNER discovering GymBro from scratch:
#   - Persona: "Alex", beginner, General Fitness, KG, 3 days/week, 45 min, Maintain
#   - Very light weights: dumbbells 5-12.5kg, machines 20-30kg
#   - Gradual progression over 8 workouts
#   - Explores: all tabs, exercise library, search, filters, settings, history, programs
#   - Tests: data persistence, navigation, UX for a novice user
#
# PATTERNS:
#   - Text tap for onboarding button (Let's Go|Vamos|Comenzar)
#   - pressKey "Enter" for NumberInputDialog
#   - "Skip|Saltar" for rest timer skip (uses swipe DOWN to scroll to top first)
#   - Bilingual regex "Spanish|English" for all assertions
#   - One exercise per workout to avoid scroll/index issues
#   - swipe DOWN to scroll content UP (return to top before Finish)
# ====================================================================================

# ====================================================================================
# PHASE 1: ONBOARDING (9 pages — beginner persona)
# ====================================================================================

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: b01_welcome

# Page 0: Welcome
- assertVisible: "GymBro"

# Page 1: Next → Goal
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500

# Select General Fitness (beginner — NOT strength/hypertrophy)
- tapOn: "Fitness General|General Fitness"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: b02_goal_general_fitness

# Page 2: Next → Experience
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Principiante|Beginner"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: b03_experience_beginner

# Page 3: Next → Training Phase
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Mantener|Maintain"
- waitForAnimationToEnd:
    timeout: 300

# Page 4: Next → Session Duration
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "45 min"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: b04_duration_45min

# Page 5: Next → Frequency
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "3 días/semana|3 days/week"
- waitForAnimationToEnd:
    timeout: 300
- takeScreenshot: b05_frequency_3days

# Pages 6-8: Info pages
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Siguiente|Next"
- waitForAnimationToEnd:
    timeout: 500

# Page 9: Get Started — kg + name "Alex"
- waitForAnimationToEnd:
    timeout: 500
- tapOn: "Kilogramos \\(kg\\)|Kilograms \\(kg\\)"
- waitForAnimationToEnd:
    timeout: 300
- tapOn:
    id: "onboarding_name_input"
- inputText: "Alex"
- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: b06_profile_ready

# Complete onboarding
- tapOn:
    text: "Let's Go|Vamos|Comenzar"
- waitForAnimationToEnd:
    timeout: 8000

- assertVisible: "Programas|Programs"
- takeScreenshot: b07_onboarding_complete

