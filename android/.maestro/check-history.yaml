appId: com.gymbro.app
name: "Check History — Navigate to history and verify entries"
tags:
  - history
  - smoke
---

- runFlow: flow/ensure-post-onboarding.yaml

onFlowStart:
  # Ensure post-onboarding state
  - launchApp
  - waitForAnimationToEnd:
      timeout: 3000
  - assertVisible: "Biblioteca de Ejercicios"

onFlowComplete:
  # Return to Library tab
  - tapOn:
      id: "nav_exercise_library"
      optional: true

# Navigate to History tab
- tapOn:
    id: "nav_history"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: history_tab

# Verify History screen loads
- assertVisible: "Historial de Entrenamientos"

# Check for workout entries or empty state
- assertVisible:
    text: "Sin Entrenamientos Aún|Hoy|Ayer"
    optional: true
- takeScreenshot: history_content

# If there are workouts, tap the first one to see details
- tapOn:
    text: ".*"
    index: 0
    optional: true

# Take screenshot of whatever state we're in
- takeScreenshot: history_detail_or_empty

# Navigate back
- back
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: history_after_back
