appId: com.gymbro.app
name: "Check History — Navigate to history and verify entries"
tags:
  - history
  - smoke
---

- launchApp

# Navigate to History tab
- tapOn: "History"
- takeScreenshot: history_tab

# Verify History screen loads
- assertVisible: "Workout History"

# Check for workout entries or empty state
- assertVisible:
    text: "No Workouts Yet|Today|Yesterday"
    optional: true
- takeScreenshot: history_content

# If there are workouts, tap the first one to see details
- tapOn:
    text: ".*"
    index: 0
    optional: true

# Take screenshot of whatever state we're in
- takeScreenshot: history_detail_or_empty

# Navigate back
- back
- takeScreenshot: history_after_back
