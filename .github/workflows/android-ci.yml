name: Android CI

on:
  push:
    branches: [ main, master ]
    paths: ['android/**']
  pull_request:
    branches: [ main, master ]
    paths: ['android/**']

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Build debug APK
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      timeout-minutes: 10

    - name: Run unit tests
      working-directory: android
      run: ./gradlew testDebugUnitTest --no-daemon --stacktrace --continue
      timeout-minutes: 15

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          android/*/build/test-results/**/*.xml
          android/*/build/reports/**
        if-no-files-found: ignore

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: android/app/build/outputs/apk/debug/
        if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Android Lint
      working-directory: android
      run: ./gradlew lintDebug --no-daemon --stacktrace
      timeout-minutes: 15

    - name: Upload lint results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: android/*/build/reports/lint-results-*.html
        if-no-files-found: ignore
