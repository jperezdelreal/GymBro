name: Maestro E2E Tests

on:
  pull_request:
    branches: [ main, master ]
    paths: ['android/**', '.github/workflows/maestro-e2e.yml']
  push:
    branches: [ main, master ]
    paths: ['android/**', '.github/workflows/maestro-e2e.yml']

jobs:
  maestro-smoke:
    name: Maestro Smoke Suite
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build debug APK
      working-directory: android
      run: ./gradlew assembleDebug --no-daemon

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Maestro Smoke Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        force-avd-creation: false
        emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: |
          # Install Maestro
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          
          # Install APK
          adb install android/app/build/outputs/apk/debug/*.apk
          
          # Wait for device to be ready
          adb wait-for-device
          sleep 5
          
          # Run smoke suite with retry and timeout
          # Capture output for performance metrics
          maestro test android/.maestro/ \
            --include-tags smoke \
            --repeat-on-failure 1 \
            --timeout 120000 2>&1 | tee maestro-smoke-output.log
          
          # Store exit code
          echo $? > maestro-smoke-exitcode.txt
    
    - name: Generate Test Report
      if: always()
      run: |
        echo "## 📊 Maestro Smoke Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Flow | Status | Duration |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|----------|" >> $GITHUB_STEP_SUMMARY
        
        # Parse Maestro output for flow results
        if [ -f maestro-smoke-output.log ]; then
          # Extract flow results (Maestro outputs "✅ Flow completed" or "❌ Flow failed")
          grep -E "(Running|✅|❌|✓|✗)" maestro-smoke-output.log | while IFS= read -r line; do
            if echo "$line" | grep -q "Running"; then
              flow_name=$(echo "$line" | sed -n 's/.*Running \(.*\)/\1/p' | sed 's/\.yaml//')
              echo "$flow_name|⏳ Running|N/A" >> test-results.tmp
            elif echo "$line" | grep -qE "(✅|✓)"; then
              # Look for duration in milliseconds
              duration=$(echo "$line" | grep -oP '\d+ms' || echo "N/A")
              # Get last flow name from temp file
              if [ -f test-results.tmp ]; then
                sed -i '$ s/|⏳ Running|N\/A$/|✅ Passed|'"$duration"'/' test-results.tmp
              fi
            elif echo "$line" | grep -qE "(❌|✗)"; then
              if [ -f test-results.tmp ]; then
                sed -i '$ s/|⏳ Running|N\/A$/|❌ Failed|N\/A/' test-results.tmp
              fi
            fi
          done
          
          # Output results to summary
          if [ -f test-results.tmp ]; then
            cat test-results.tmp >> $GITHUB_STEP_SUMMARY
            rm test-results.tmp
          fi
        fi
        
        # Add overall result
        exitcode=0
        if [ -f maestro-smoke-exitcode.txt ]; then
          exitcode=$(cat maestro-smoke-exitcode.txt)
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ "$exitcode" -eq 0 ]; then
          echo "### ✅ All smoke tests passed!" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Some smoke tests failed" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Maestro Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: maestro-test-results-smoke
        path: |
          ~/.maestro/tests/**/*.png
          ~/.maestro/tests/**/*.mp4
          ~/.maestro/tests/**/*.log
          maestro-smoke-output.log
        if-no-files-found: ignore
        retention-days: 7

  maestro-regression:
    name: Maestro Full Regression
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60

