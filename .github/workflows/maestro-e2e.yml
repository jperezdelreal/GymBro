        fi

    - name: Upload Maestro Test Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: maestro-test-results-regression
        path: |
          ~/.maestro/tests/**/*.png
          ~/.maestro/tests/**/*.mp4
          ~/.maestro/tests/**/*.log
